<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GestivaOne — Plataforma Comercial</title>
    <meta name="description" content="Gestión comercial inteligente: facturación, clientes, inventario y analíticas en tiempo real." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <!-- Prevent FOUC: apply saved theme and set up self-healing error handler -->
    <script>
      (function() {
        try {
          var ui = JSON.parse(localStorage.getItem('gestiva-ui') || '{}');
          var theme = ui.state?.theme || 'dark';
          if (theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
          }
        } catch(e) {
          document.documentElement.classList.add('dark');
        }

        // Self-healing mechanism for bundle hash changes, chunk load failures, or ReferenceErrors
        window.addEventListener('error', function(e) {
          var msg = e.message || '';
          if (
            msg.indexOf('Zap is not defined') > -1 || 
            msg.indexOf('ReferenceError') > -1 ||
            msg.indexOf('loading-failed') > -1 ||
            msg.indexOf('Failed to fetch dynamically') > -1
          ) {
            var lastReload = sessionStorage.getItem('gestiva-auto-reload-time');
            var now = Date.now();
            if (!lastReload || (now - parseInt(lastReload, 10) > 10000)) {
              sessionStorage.setItem('gestiva-auto-reload-time', now.toString());
              console.warn('Script error detected. Force reloading page to clear cache and load fresh assets...');
              window.location.reload(true);
            }
          }
        }, true);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
